name: Automatically Cache ORCID Publications

on:
  schedule:
    # Runs at minute 0 past every hour
    - cron: '0 * * * *'
  workflow_dispatch: # Allows manual trigger from the Actions tab

permissions:
  contents: write # Needed to commit the cached JSON

jobs:
  update-cache:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'

      - name: Fetch from ORCID API
        run: |
          python fetch_orcid.py

      - name: Commit and Push Changes
        run: |
          git config --global user.name 'github-actions[bot]'
          git config --global user.email 'github-actions[bot]@users.noreply.github.com'
          git add publications.json
          # Only commit and push if there are changes
          if git diff --staged --quiet; then
            echo "No new publications found. Cache is up to date."
          else
            git commit -m "Auto-update publications.json cache from ORCID"
            git push
          fi
